<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Akaruo · Our Items</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      background: #0e0c0a;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .items-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h2 {
      text-align: center;
      font-size: 3rem;
      font-weight: 350;
      color: #e7d5c4;
      margin-bottom: 2.5rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      animation: fadeTitle 1s;
    }

    @keyframes fadeTitle {
      0% { opacity: 0; transform: translateY(-15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2rem;
    }

    .product-card {
      background: #1b1713;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 30px -8px black;
      border: 1px solid #4a3e34;
      transition: all 0.3s;
      animation: cardFade 0.8s backwards;
      animation-delay: calc(var(--i, 0) * 0.05s);
    }

    .product-card:hover {
      transform: translateY(-6px);
      border-color: #b39274;
    }

    @keyframes cardFade {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1/1;
      overflow: hidden;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s;
    }

    .product-card:hover .product-img img {
      transform: scale(1.05);
    }

    .back-home {
      display: inline-block;
      margin-top: 3rem;
      color: #d4bca6;
      text-decoration: none;
      padding: 0.8rem 2rem;
      border: 1px solid #7a6554;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }

    .back-home:hover {
      background: #352a21;
      color: #f5e2d2;
    }
  </style>
</head>
<body>
<div class="items-container">
  <h2>Our Items</h2>
  <div class="product-grid">
    <div class="product-card" style="--i:1"><div class="product-img"><img src="https://i.ibb.co/3y411ypW/1000066817.jpg" alt="item"></div></div>
    <div class="product-card" style="--i:2"><div class="product-img"><img src="https://i.ibb.co/zVxvWzrD/1000066832.jpg" alt="item"></div></div>
    <div class="product-card" style="--i:3"><div class="product-img"><img src="https://i.ibb.co/DDDCrR8B/1000066879.jpg" alt="item"></div></div>
    <div class="product-card" style="--i:4"><div class="product-img"><img src="https://i.ibb.co/JwGNRSv6/1000066820.jpg" alt="item"></div></div>
    <div class="product-card" style="--i:5"><div class="product-img"><img src="https://i.ibb.co/TB8sMskZ/1000066807.jpg" alt="item"></div></div>
    <div class="product-card" style="--i:6"><div class="product-img"><img src="https://i.ibb.co/7xMSNtCB/1000066755.jpg" alt="item"></div></div>
  </div>
  <div style="text-align: center;">
    <a href="home.html" class="back-home">← Back to Home</a>
  </div>
</div>
</body>
</html>
