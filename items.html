<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akaruo • Signature</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            width: 100vw; height: 100vh;
            overflow: hidden; background: #0a0806;
        }
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/WvGY2kx7/1000066583.jpg');
            background-size: cover; background-position: center 30%;
            animation: slowPan 18s infinite alternate;
            z-index: 0;
        }
        @keyframes slowPan {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }
        .overlay-dark {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1;
        }
        .content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; width: 90%; max-width: 700px;
            text-align: center;
            animation: appear 1.2s;
        }
        @keyframes appear {
            0% { opacity: 0; transform: translate(-50%, -40%); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.8rem; font-weight: 600;
            color: #efe0cf; letter-spacing: 6px;
            text-shadow: 0 8px 35px #000; margin-bottom: 2.5rem;
        }
        .glass-product-card {
            background: rgba(15,12,10,0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(210,175,130,0.4);
            border-radius: 40px; padding: 2.2rem 2rem;
            color: #f0e3d4;
            box-shadow: 0 25px 45px #00000060;
            text-align: left;
        }
        .product-row {
            display: flex; justify-content: space-between;
            padding: 1rem 0; border-bottom: 1px solid rgba(200,170,130,0.3);
        }
        .product-row:last-child { border: none; }
        .prod-name { font-weight: 500; font-size: 1.2rem; }
        .prod-price { font-family: 'Cormorant Garamond', serif; font-weight: 700; color: #e2c7a3; }
        .desc { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }
        .btn-order {
            margin-top: 2rem; background: linear-gradient(145deg, #bfa07a, #9e7e58);
            border: none; padding: 1rem 2.5rem; border-radius: 60px;
            font-size: 1.2rem; font-weight: 500; color: #0a0806;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px #00000050;
            border: 1px solid #e6caa8; letter-spacing: 2px;
        }
        .btn-order:hover {
            background: #dabb90; transform: scale(1.02);
            box-shadow: 0 0 25px #d4af7a;
        }
        .back-link {
            position: absolute; bottom: 25px; left: 25px; z-index: 20;
            color: #e7d5bd; text-decoration: none; font-weight: 500;
            background: rgba(0,0,0,0.3); padding: 8px 22px; border-radius: 40px;
            backdrop-filter: blur(8px);
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>
    <div class="overlay-dark"></div>
    <div class="content">
        <h1>AKARUO SIGNATURE</h1>
        <div class="glass-product-card">
            <div class="product-row"><div class="prod-name">Akaruō Iced Coffee Mix <span class="desc">(50g)</span></div><div class="prod-price">₹129</div></div>
            <div class="product-row"><div class="prod-name">Akaruō Instant Coffee Mix <span class="desc">(50g)</span></div><div class="prod-price">₹99</div></div>
            <div class="product-row"><div class="prod-name">Akaruō Classic Black Coffee <span class="desc">(50g)</span></div><div class="prod-price">₹119</div></div>
            <div class="product-row"><div class="prod-name">Akaruō Zest Lemon Tea <span class="desc">(50g)</span></div><div class="prod-price">₹169</div></div>
            <div class="product-row"><div class="prod-name">Akaruō Royal Masala Milk <span class="desc">(50g)</span></div><div class="prod-price">₹169</div></div>
            <div class="product-row"><div class="prod-name">Akaruō Velvet Hot Chocolate <span class="desc">(50g)</span></div><div class="prod-price">₹179</div></div>
        </div>
        <button class="btn-order" id="viewPricesBtn">VIEW PRICES / BUY NOW</button>
    </div>
    <a href="home.html" class="back-link">← BACK</a>
    <script>
        document.getElementById('viewPricesBtn').addEventListener('click', ()=>{
            document.body.style.opacity='0'; document.body.style.transition='opacity 0.5s';
            setTimeout(()=>{ window.location.href='order.html?product=Akaruo Signature Selection&price=Starting ₹99'; },400);
        });
    </script>
</body>
</html>
