<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Akaruo | Signature Collection</title>
    <!-- Google Fonts: Playfair Display + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #0a0806;
        }

        /* Fullscreen Background with Slow Zoom */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05);
            animation: slowZoom 20s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes slowZoom {
            0% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1.18);
            }
        }

        /* Dark Overlay for Readability */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        /* Main Container - Center Content, No Scroll */
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* Content Wrapper with Fade-in Animation */
        .content {
            max-width: 900px;
            width: 100%;
            animation: fadeInUp 1.1s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Premium Typography */
        .brand-icon {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            letter-spacing: 6px;
            color: rgba(230, 180, 110, 0.8);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .main-heading {
            font-family: 'Playfair Display', serif;
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #F8E3C2 0%, #E7BF8B 40%, #F5CD9E 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(250, 235, 200, 0.9);
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-top: 0.5rem;
            margin-bottom: 2rem;
        }

        /* Gold Divider */
        .gold-divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #E6A557, #F5C28E, #E6A557, transparent);
            margin: 1.5rem auto 2rem auto;
            border-radius: 2px;
        }

        /* Button Group */
        .button-group {
            display: flex;
            gap: 1.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        /* Premium Glassmorphism Buttons */
        .premium-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            background: rgba(20, 18, 16, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(230, 180, 110, 0.7);
            color: #F8E8D0;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            text-decoration: none;
            display: inline-block;
        }

        .premium-btn:hover {
            transform: scale(1.05);
            background: rgba(201, 160, 61, 0.25);
            border-color: #E6A557;
            color: #FFEFD0;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35), 0 0 15px rgba(230, 165, 87, 0.3);
        }

        .premium-btn:active {
            transform: scale(0.98);
        }

        /* Back Button - subtle but elegant */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            background: rgba(20, 18, 16, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(230, 180, 110, 0.5);
            color: #EAD5B0;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn:hover {
            background: rgba(201, 160, 61, 0.2);
            border-color: #E6A557;
            color: #FFE8C8;
            transform: translateX(-3px);
        }

        /* Footer note (optional minimal) */
        .footer-note {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(230, 200, 150, 0.4);
            letter-spacing: 1.5px;
            z-index: 2;
            font-family: 'Poppins', sans-serif;
        }

        /* Responsive Design - Mobile Friendly */
        @media (max-width: 768px) {
            .main-heading {
                font-size: 2.8rem;
            }
            .subtitle {
                font-size: 0.8rem;
                letter-spacing: 3px;
                padding: 0.3rem 1rem;
            }
            .premium-btn {
                padding: 0.7rem 1.6rem;
                font-size: 0.8rem;
            }
            .button-group {
                gap: 1.2rem;
            }
            .back-btn {
                top: 20px;
                left: 20px;
                padding: 0.5rem 1.2rem;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 550px) {
            .main-heading {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 0.7rem;
                letter-spacing: 2px;
            }
            .premium-btn {
                padding: 0.6rem 1.3rem;
                font-size: 0.7rem;
            }
            .brand-icon {
                font-size: 0.7rem;
                letter-spacing: 4px;
            }
        }

        /* Ensure no scrollbar appears */
        body {
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="bg-wrapper">
    <img class="bg-image" src="https://i.ibb.co/yc6TMr6s/1000066583.jpg" alt="Akaruo Signature Collection Background">
</div>
<div class="dark-overlay"></div>

<!-- Back Button to Home -->
<a href="home.html" class="back-btn">← Back</a>

<div class="container">
    <div class="content">
        <div class="brand-icon">✦ Akaruo ✦</div>
        <h1 class="main-heading">Akaruo Signature Collection</h1>
        <div class="subtitle">Crafted for Premium Taste</div>
        <div class="gold-divider"></div>
        <div class="button-group">
            <a href="items.html" class="premium-btn">Explore Items</a>
        </div>
    </div>
</div>
<div class="footer-note">
    ✦ limited release | artisanal blend ✦
</div>

</body>
</html>
