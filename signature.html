<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Akaruo • Our Items</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0d0b09; color: #ede0d2;
            min-height: 100vh; padding: 20px 16px 40px;
        }
        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem; text-align: center; margin: 30px 0 40px;
            letter-spacing: 6px; font-weight: 500;
            animation: fadeIn 1s;
        }
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 22px; max-width: 1200px; margin: 0 auto;
        }
        @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        .card {
            background: #1a1612; border-radius: 32px;
            overflow: hidden; box-shadow: 0 20px 30px #00000060;
            transition: all 0.3s; border: 1px solid #3f362b;
            animation: cardFade 0.8s backwards;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 25px 40px #000000b0, 0 0 15px #b39264; }
        .card img {
            width: 100%; aspect-ratio: 1/1.1; object-fit: cover;
            display: block; background: #2a221c;
        }
        .card-info { padding: 1.5rem 1.2rem; }
        .product-name {
            font-size: 1.4rem; font-weight: 600; font-family: 'Cormorant Garamond', serif;
            margin-bottom: 6px; color: #e7cfb2;
        }
        .product-price {
            font-size: 1.7rem; font-weight: 700; color: #cbae89;
            margin: 0.5rem 0 1.2rem;
        }
        .buy-btn {
            background: #a5835e; border: none; color: #0b0907;
            padding: 0.9rem; width: 100%; border-radius: 50px;
            font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: 0.25s; border: 1px solid #dbbd98;
        }
        .buy-btn:hover { background: #c8a87c; transform: scale(1.01); }
        .back-btn {
            display: inline-block; margin: 20px 0 0 20px;
            color: #dac2a6; text-decoration: none; font-weight: 500;
        }
        @keyframes fadeIn { 0% { opacity:0; transform: translateY(15px); } 100% { opacity:1; transform:translateY(0); } }
        @keyframes cardFade { from { opacity:0; transform: translateY(25px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body>
    <a href="home.html" class="back-btn">← HOME</a>
    <h1 class="page-title">OUR ITEMS</h1>
    <div class="grid" id="productGrid"></div>
    <script>
        const products = [
            { name: 'Iced Coffee Mix', price: '₹129', img: 'https://i.ibb.co/3y411ypW/1000066817.jpg' },
            { name: 'Instant Coffee Mix', price: '₹99', img: 'https://i.ibb.co/zVxvWzrD/1000066832.jpg' },
            { name: 'Classic Black Coffee', price: '₹119', img: 'https://i.ibb.co/DDDCrR8B/1000066879.jpg' },
            { name: 'Zest Lemon Tea', price: '₹169', img: 'https://i.ibb.co/JwGNRSv6/1000066820.jpg' },
            { name: 'Royal Masala Milk', price: '₹169', img: 'https://i.ibb.co/TB8sMskZ/1000066807.jpg' },
            { name: 'Velvet Hot Chocolate', price: '₹179', img: 'https://i.ibb.co/7xMSNtCB/1000066755.jpg' }
        ];
        const grid = document.getElementById('productGrid');
        products.forEach((p,i) => {
            const card = document.createElement('div'); card.className = 'card';
            card.style.animationDelay = `${i*0.08}s`;
            card.innerHTML = `
                <img src="${p.img}" alt="${p.name}" loading="lazy">
                <div class="card-info">
                    <div class="product-name">Akaruō ${p.name}</div>
                    <div class="product-price">${p.price}</div>
                    <button class="buy-btn" data-name="Akaruō ${p.name}" data-price="${p.price}">BUY NOW</button>
                </div>`;
            grid.appendChild(card);
        });
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const name = encodeURIComponent(btn.dataset.name);
                const price = encodeURIComponent(btn.dataset.price);
                window.location.href = `order.html?product=${name}&price=${price}`;
            });
        });
    </script>
</body>
</html>
