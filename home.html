<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5efe6;
    color: #333;
}

/* Header */
.header {
    text-align: center;
    padding: 40px 20px 10px;
}

.header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    margin: 0;
}

.header p {
    margin-top: 5px;
    color: #777;
}

/* Section Title */
.section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    margin: 30px 20px 10px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Card */
.card {
    background: #fff;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* Image */
.card img {
    width: 100%;
    border-radius: 10px;
}

/* Name */
.card h3 {
    margin: 10px 0 5px;
    font-size: 1rem;
}

/* Price */
.price {
    color: #b8860b;
    font-weight: bold;
}

/* Button */
.btn {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg,#d4af37,#b8860b);
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <h1>Akaruo</h1>
    <p>Luxury in Every Sip</p>
</div>

<!-- Coffee Range -->
<div class="section-title">☕ Coffee Range</div>
<div class="grid">

    <div class="card">
        <img src="https://i.ibb.co/Rp9jjy1v/1000066817.jpg">
        <h3>Akaruo Iced Coffee Mix</h3>
        <div class="price">₹129</div>
        <button class="btn" onclick="buy('Akaruo Iced Coffee Mix',129)">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/LzMjY1ZF/1000066805.jpg">
        <h3>Akaruo Instant Coffee Mix</h3>
        <div class="price">₹99</div>
        <button class="btn" onclick="buy('Akaruo Instant Coffee Mix',99)">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/Y7yNzkRX/1000066832.jpg">
        <h3>Akaruo Classic Black Coffee</h3>
        <div class="price">₹119</div>
        <button class="btn" onclick="buy('Akaruo Classic Black Coffee',119)">Buy Now</button>
    </div>

</div>

<!-- Premium Beverages -->
<div class="section-title">🍵 Premium Beverages</div>
<div class="grid">

    <div class="card">
        <img src="https://i.ibb.co/Xk4XRs8x/1000066820.jpg">
        <h3>Akaruo Zest Lemon Tea</h3>
        <div class="price">₹169</div>
        <button class="btn" onclick="buy('Akaruo Zest Lemon Tea',169)">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/3yT3fXDR/1000066807.jpg">
        <h3>Akaruo Royal Masala Milk</h3>
        <div class="price">₹169</div>
        <button class="btn" onclick="buy('Akaruo Royal Masala Milk',169)">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://i.ibb.co/jPMn5xvZ/1000066878.jpg">
        <h3>Akaruo Velvet Hot Chocolate</h3>
        <div class="price">₹179</div>
        <button class="btn" onclick="buy('Akaruo Velvet Hot Chocolate',179)">Buy Now</button>
    </div>

</div>

<script>
function buy(product, price){
    window.location.href = `order.html?product=${encodeURIComponent(product)}&price=${price}`;
}
</script>

</body>
</html>
