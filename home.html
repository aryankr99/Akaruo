<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Akaruo | Luxury Coffee & Beverages</title>
    <!-- Google Fonts: Playfair Display + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #FCF9F4 0%, #F5EDE1 100%);
            color: #2C1D12;
            overflow-x: hidden;
        }

        /* Premium Color Palette */
        :root {
            --gold: #C9A03D;
            --gold-light: #E2BB6B;
            --dark-brown: #3E2A1F;
            --deep-espresso: #2C1A0E;
            --beige-warm: #FFF9F0;
            --card-bg: rgba(255, 253, 250, 0.95);
            --shadow-soft: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 30px 45px -15px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(201, 160, 61, 0.25);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.8rem 2rem 3rem;
        }

        /* ========== PREMIUM HEADER - CLEAN, NO EXTRA TEXT ========== */
        .luxury-header {
            text-align: center;
            padding: 1rem 0 1.8rem 0;
            margin-bottom: 1rem;
            position: relative;
            border-bottom: 2px solid rgba(201, 160, 61, 0.25);
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #3E2A1F 0%, #C9A03D 55%, #A87F2E 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .brand-subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #8B6946;
            border-top: 1px solid rgba(201, 160, 61, 0.5);
            display: inline-block;
            padding-top: 0.7rem;
        }

        /* Gold decorative line accent */
        .luxury-header::after {
            content: "✦";
            font-size: 1rem;
            color: var(--gold);
            position: absolute;
            bottom: -0.7rem;
            left: 50%;
            transform: translateX(-50%);
            background: #F5EDE1;
            padding: 0 1rem;
        }

        /* Section Titles */
        .category-wrapper {
            margin-top: 2.8rem;
            margin-bottom: 1rem;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.8rem;
        }

        .category-icon {
            font-size: 1.8rem;
        }

        .category-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-brown);
            letter-spacing: -0.3px;
            position: relative;
        }

        .category-title h2:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 55px;
            height: 2.5px;
            background: linear-gradient(90deg, var(--gold), #E7C57A);
            border-radius: 2px;
        }

        /* Product Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Premium Card Design */
        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border-radius: 1.8rem;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(201, 160, 61, 0.2);
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Staggered animation */
        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.1s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.2s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(6) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: var(--shadow-hover);
            border-color: rgba(201, 160, 61, 0.5);
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .product-card:hover .product-img {
            transform: scale(1.02);
        }

        .product-info {
            padding: 1.4rem 1.2rem 1.6rem;
            text-align: center;
            background: linear-gradient(0deg, #FFFFFF, #FFFCF8);
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--deep-espresso);
            margin-bottom: 0.4rem;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }

        .product-price {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.4rem;
            color: var(--gold);
            margin: 0.5rem 0 1rem 0;
        }

        .price-currency {
            font-size: 0.95rem;
            font-weight: 500;
            color: #B8863B;
        }

        /* Buy Now Button */
        .buy-now-btn {
            background: transparent;
            border: 1.5px solid var(--gold);
            color: var(--dark-brown);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 80%;
            margin: 0 auto;
            letter-spacing: 1px;
            background: rgba(201, 160, 61, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .buy-now-btn:hover {
            background: linear-gradient(95deg, #C9A03D, #B58C2E);
            color: white;
            border-color: #C9A03D;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(201, 160, 61, 0.3);
        }

        .buy-now-btn:active {
            transform: scale(0.98);
        }

        /* Footer */
        .elegant-footer {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 1.8rem;
            border-top: 1px solid rgba(201, 160, 61, 0.25);
            font-size: 0.75rem;
            color: #A27D55;
            letter-spacing: 1px;
            font-family: 'Poppins', sans-serif;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .container {
                padding: 1.2rem 1.5rem 2rem;
            }
            .brand-name {
                font-size: 3.5rem;
            }
            .products-grid {
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.3rem;
            }
            .brand-name {
                font-size: 2.8rem;
            }
            .brand-subtitle {
                font-size: 0.8rem;
                letter-spacing: 4px;
            }
            .category-title h2 {
                font-size: 1.7rem;
            }
        }

        @media (max-width: 550px) {
            .container {
                padding: 1rem 1.2rem 2rem;
            }
            .products-grid {
                grid-template-columns: 1fr;
                max-width: 360px;
                margin-left: auto;
                margin-right: auto;
            }
            .brand-name {
                font-size: 2.3rem;
            }
            .product-name {
                font-size: 1.15rem;
            }
            .product-price {
                font-size: 1.2rem;
            }
            .buy-now-btn {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header: ONLY brand name and subtitle - clean, no extra text -->
    <div class="luxury-header">
        <div class="brand-name">Akaruo</div>
        <div class="brand-subtitle">Luxury in Every Sip</div>
    </div>

    <!-- Coffee Range Section -->
    <div class="category-wrapper">
        <div class="category-title">
            <span class="category-icon">☕</span>
            <h2>Coffee Range</h2>
        </div>
        <div class="products-grid">
            <!-- 1. Akaruo Iced Coffee Mix - ₹129 -->
            <div class="product-card" data-name="Akaruo Iced Coffee Mix" data-price="129">
                <img class="product-img" src="https://i.ibb.co/Rp9jjy1v/1000066817.jpg" alt="Akaruo Iced Coffee Mix">
                <div class="product-info">
                    <div class="product-name">Akaruo Iced Coffee Mix</div>
                    <div class="product-price"><span class="price-currency">₹</span>129</div>
                    <button class="buy-now-btn">Buy Now →</button>
                </div>
            </div>
            <!-- 2. Akaruo Instant Coffee Mix - ₹99 -->
            <div class="product-card" data-name="Akaruo Instant Coffee Mix" data-price="99">
                <img class="product-img" src="https://i.ibb.co/LzMjY1ZF/1000066805.jpg" alt="Akaruo Instant Coffee Mix">
                <div class="product-info">
                    <div class="product-name">Akaruo Instant Coffee Mix</div>
                    <div class="product-price"><span class="price-currency">₹</span>99</div>
                    <button class="buy-now-btn">Buy Now →</button>
                </div>
            </div>
            <!-- 3. Akaruo Classic Black Coffee - ₹119 -->
            <div class="product-card" data-name="Akaruo Classic Black Coffee" data-price="119">
                <img class="product-img" src="https://i.ibb.co/Rp9jjy1v/1000066817.jpg" alt="Akaruo Classic Black Coffee">
                <div class="product-info">
                    <div class="product-name">Akaruo Classic Black Coffee</div>
                    <div class="product-price"><span class="price-currency">₹</span>119</div>
                    <button class="buy-now-btn">Buy Now →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Premium Beverages Section -->
    <div class="category-wrapper">
        <div class="category-title">
            <span class="category-icon">🍵</span>
            <h2>Premium Beverages</h2>
        </div>
        <div class="products-grid">
            <!-- 4. Akaruo Zest Lemon Tea - ₹169 -->
            <div class="product-card" data-name="Akaruo Zest Lemon Tea" data-price="169">
                <img class="product-img" src="https://i.ibb.co/Xk4XRs8x/1000066820.jpg" alt="Akaruo Zest Lemon Tea">
                <div class="product-info">
                    <div class="product-name">Akaruo Zest Lemon Tea</div>
                    <div class="product-price"><span class="price-currency">₹</span>169</div>
                    <button class="buy-now-btn">Buy Now →</button>
                </div>
            </div>
            <!-- 5. Akaruo Royal Masala Milk - ₹169 -->
            <div class="product-card" data-name="Akaruo Royal Masala Milk" data-price="169">
                <img class="product-img" src="https://i.ibb.co/3yT3fXDR/1000066807.jpg" alt="Akaruo Royal Masala Milk">
                <div class="product-info">
                    <div class="product-name">Akaruo Royal Masala Milk</div>
                    <div class="product-price"><span class="price-currency">₹</span>169</div>
                    <button class="buy-now-btn">Buy Now →</button>
                </div>
            </div>
            <!-- 6. Akaruo Velvet Hot Chocolate - ₹179 -->
            <div class="product-card" data-name="Akaruo Velvet Hot Chocolate" data-price="179">
                <img class="product-img" src="https://i.ibb.co/4RK1whdN/1000066814.jpg" alt="Akaruo Velvet Hot Chocolate">
                <div class="product-info">
                    <div class="product-name">Akaruo Velvet Hot Chocolate</div>
                    <div class="product-price"><span class="price-currency">₹</span>179</div>
                    <button class="buy-now-btn">Buy Now →</button>
                </div>
            </div>
        </div>
    </div>
    <div class="elegant-footer">
        ✦ artisanal craft | pure indulgence ✦
    </div>
</div>

<script>
    // Get all Buy Now buttons
    const buyButtons = document.querySelectorAll('.buy-now-btn');
    
    // Add click event to each button for redirect to checkout with product and price parameters
    buyButtons.forEach(button => {
        button.addEventListener('click', function(event) {
            event.stopPropagation();
            
            // Find parent product-card
            const productCard = this.closest('.product-card');
            if (productCard) {
                // Get product name and price from data attributes
                let productName = productCard.getAttribute('data-name');
                let productPrice = productCard.getAttribute('data-price');
                
                // Fallback: if data attributes missing, extract from DOM
                if (!productName) {
                    const nameElem = productCard.querySelector('.product-name');
                    if (nameElem) productName = nameElem.innerText.trim();
                }
                if (!productPrice) {
                    const priceElem = productCard.querySelector('.product-price');
                    if (priceElem) {
                        let priceText = priceElem.innerText.trim();
                        let match = priceText.match(/[\d]+/);
                        if (match) productPrice = match[0];
                    }
                }
                
                // Encode parameters for URL safety
                const encodedProduct = encodeURIComponent(productName);
                const encodedPrice = encodeURIComponent(productPrice);
                
                // Redirect to checkout.html with query parameters
                window.location.href = `checkout.html?product=${encodedProduct}&price=${encodedPrice}`;
            } else {
                console.warn("Product card not found");
            }
        });
    });
</script>

</body>
</html>
