<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Akaruo · Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      background: #0a0807;
    }

    .slider-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
      background-size: cover;
      background-position: center;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
    }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: brightness(0.9);
    }

    .content-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: fadeIn 1.2s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: clamp(3rem, 12vw, 5.5rem);
      font-weight: 400;
      color: #fff;
      text-shadow: 0 20px 40px rgba(0,0,0,0.5);
      margin-bottom: 3rem;
      letter-spacing: 3px;
      text-align: center;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
    }

    .premium-btn {
      background: rgba(20, 15, 10, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(220, 185, 150, 0.5);
      border-radius: 60px;
      padding: 1.2rem 2.8rem;
      font-size: 1.5rem;
      font-weight: 400;
      color: #f5ebe2;
      text-decoration: none;
      letter-spacing: 2px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transition: all 0.35s;
      text-align: center;
      min-width: 260px;
    }

    .premium-btn:hover {
      background: rgba(200, 140, 90, 0.3);
      border-color: #dbb594;
      transform: translateY(-6px);
      box-shadow: 0 30px 50px rgba(0,0,0,0.4);
      color: #ffffff;
    }

    @media (max-width: 600px) {
      .premium-btn { font-size: 1.2rem; padding: 1rem 1.8rem; min-width: 220px; }
      h1 { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

<div class="slider-container">
  <div class="slide active" style="background-image: url('https://i.ibb.co/d0FPHxZP/1000066585.jpg');"></div>
  <div class="slide" style="background-image: url('https://i.ibb.co/mVnnjygM/1000066584.jpg');"></div>
  <div class="slide" style="background-image: url('https://i.ibb.co/g2xj0Wy/1000066588.jpg');"></div>
</div>

<div class="content-overlay">
  <h1>Welcome to Akaruo</h1>
  <div class="button-group">
    <a href="signature.html" class="premium-btn">Akaruo Signature Collection</a>
    <a href="items.html" class="premium-btn">Our Items</a>
  </div>
</div>

<script>
  (function() {
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const total = slides.length;

    function nextSlide() {
      slides[current].classList.remove('active');
      current = (current + 1) % total;
      slides[current].classList.add('active');
    }

    setInterval(nextSlide, 4000);

    // Ensure images are clear, no additional blur
  })();
</script>
</body>
</html>
