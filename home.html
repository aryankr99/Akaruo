<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Gallery</title><!-- Google Font --><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><!-- GSAP --><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top, #111, #000);
  color:#fff;
  overflow-x:hidden;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

h1{
  font-size:48px;
  font-weight:700;
  background:linear-gradient(45deg,#FFD700,#fff3b0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:15px;
  color:#aaa;
  font-size:16px;
}

.gallery{
  margin-top:60px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:all 0.4s ease;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform 0.6s ease;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:all 0.4s ease;
}

.overlay h3{
  color:#FFD700;
  transform:translateY(20px);
  opacity:0;
}

.overlay span{
  margin-top:10px;
  font-size:14px;
  color:#fff;
  transform:translateY(20px);
  opacity:0;
}

.card:hover img{
  transform:scale(1.1);
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 40px rgba(255,215,0,0.15);
}

.card:hover .overlay{
  opacity:1;
}

.card:hover .overlay h3,
.card:hover .overlay span{
  transform:translateY(0);
  opacity:1;
}

</style></head><body><div class="container">
  <h1 class="title">Luxury Collection</h1>
  <p class="subtitle">Experience elegance through curated visuals</p>  <div class="gallery"><a href="#" class="card"><img src="https://i.ibb.co/Rp9jjy1v/1000066817.jpg"><div class="overlay"><h3>View More</h3><span>Explore</span></div></a>

<a href="#" class="card"><img src="https://i.ibb.co/Y7yNzkRX/1000066832.jpg"><div class="overlay"><h3>View More</h3><span>Explore</span></div></a>

<a href="#" class="card"><img src="https://i.ibb.co/Xk4XRs8x/1000066820.jpg"><div class="overlay"><h3>View More</h3><span>Explore</span></div></a>

<a href="#" class="card"><img src="https://i.ibb.co/3yT3fXDR/1000066807.jpg"><div class="overlay"><h3>View More</h3><span>Explore</span></div></a>

<a href="#" class="card"><img src="https://i.ibb.co/4RK1whdN/1000066814.jpg"><div class="overlay"><h3>View More</h3><span>Explore</span></div></a>

<a href="#" class="card"><img src="https://i.ibb.co/LzMjY1ZF/1000066805.jpg"><div class="overlay"><h3>View More</h3><span>Explore</span></div></a>

  </div>
</div><script>

// Register plugin
 gsap.registerPlugin(ScrollTrigger);

// Page load animation
const tl = gsap.timeline();

tl.from(".title", {
  y:50,
  opacity:0,
  duration:1,
  ease:"power3.out"
})
.from(".subtitle", {
  y:30,
  opacity:0,
  duration:1,
  ease:"power3.out"
}, "-=0.6")
.from(".card", {
  y:60,
  opacity:0,
  stagger:0.15,
  duration:1,
  ease:"power3.out"
}, "-=0.6");

// Scroll animation
 gsap.utils.toArray(".card").forEach((card) => {
  gsap.from(card, {
    scrollTrigger:{
      trigger:card,
      start:"top 85%"
    },
    y:80,
    opacity:0,
    duration:1,
    ease:"power3.out"
  });
});

// Parallax effect
 document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const moveX = (x - rect.width/2) / 20;
    const moveY = (y - rect.height/2) / 20;

    gsap.to(card.querySelector("img"), {
      x: moveX,
      y: moveY,
      duration:0.5,
      ease:"power3.out"
    });
  });

  card.addEventListener("mouseleave", () => {
    gsap.to(card.querySelector("img"), {
      x:0,
      y:0,
      duration:0.7,
      ease:"expo.out"
    });
  });
});

</script></body>
</html>
