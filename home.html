<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Akaruo | Luxury Coffee & Beverages</title>
    <!-- Google Fonts: Playfair Display + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-color: #0a0806;
        }

        /* Fullscreen Background with Slow Zoom Animation */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05);
            animation: slowZoom 20s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes slowZoom {
            0% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1.18);
            }
        }

        /* Dark Overlay (opacity 0.55 for readability) */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        /* Main Container - Center Content */
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* Content Wrapper */
        .content {
            max-width: 850px;
            width: 100%;
            animation: fadeSlideUp 1s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(35px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Premium Typography */
        .brand-heading {
            font-family: 'Playfair Display', serif;
            font-size: 4.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #F8E3C2 0%, #E7BF8B 40%, #F5CD9E 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        .premium-subtitle {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(250, 235, 200, 0.92);
            background: rgba(0, 0, 0, 0.25);
            display: inline-block;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-bottom: 3rem;
        }

        /* Divider Accent */
        .luxury-divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #E6A557, #F5C28E, #E6A557, transparent);
            margin: 0 auto 2rem auto;
            border-radius: 2px;
        }

        /* Button Group */
        .button-group {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        /* Premium Glassmorphism Buttons */
        .glass-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            background: rgba(20, 18, 16, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(230, 180, 110, 0.7);
            color: #F8E8D0;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            text-decoration: none;
            display: inline-block;
        }

        .glass-btn:hover {
            transform: scale(1.05);
            background: rgba(201, 160, 61, 0.25);
            border-color: #E6A557;
            color: #FFEFD0;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35), 0 0 15px rgba(230, 165, 87, 0.3);
            text-shadow: 0 0 5px rgba(230, 165, 87, 0.5);
        }

        .glass-btn:active {
            transform: scale(0.98);
        }

        /* Footer Accent */
        .footer-note {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(230, 200, 150, 0.5);
            letter-spacing: 1.5px;
            z-index: 2;
            font-family: 'Poppins', sans-serif;
        }

        /* Responsive */
        @media (max-width: 650px) {
            .brand-heading {
                font-size: 2.8rem;
            }
            .premium-subtitle {
                font-size: 0.85rem;
                letter-spacing: 4px;
                margin-bottom: 2rem;
            }
            .glass-btn {
                padding: 0.8rem 1.8rem;
                font-size: 0.85rem;
            }
            .button-group {
                gap: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .brand-heading {
                font-size: 2.2rem;
            }
            .premium-subtitle {
                font-size: 0.7rem;
                letter-spacing: 3px;
            }
            .glass-btn {
                padding: 0.7rem 1.4rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="hero-bg">
    <img src="https://i.ibb.co/5WTphmsk/0fe62db976b9568aa4fdda50ec9c3614.jpg" alt="Akaruo Premium Coffee Background">
</div>
<div class="dark-overlay"></div>

<div class="container">
    <div class="content">
        <h1 class="brand-heading">Welcome to Akaruo</h1>
        <div class="premium-subtitle">Luxury in Every Sip</div>
        <div class="luxury-divider"></div>
        <div class="button-group">
            <a href="signature.html" class="glass-btn">Signature Collection</a>
            <a href="items.html" class="glass-btn">Our Items</a>
        </div>
    </div>
</div>
<div class="footer-note">
    ✦ artisanal craft | pure indulgence ✦
</div>

</body>
</html>
