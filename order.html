<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Akaruo | Premium Checkout</title>
    <!-- Google Fonts: Playfair Display + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #FCF7EF 0%, #F3EAE0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* Premium Color Palette */
        :root {
            --gold: #C9A03D;
            --gold-dark: #B68B2E;
            --dark-brown: #3E2A1F;
            --deep-espresso: #2C1A0E;
            --beige-light: #FFF9F0;
            --shadow-premium: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        /* Main Glassmorphism Card */
        .checkout-card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 252, 245, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(201, 160, 61, 0.3);
            overflow: hidden;
            transition: transform 0.3s ease;
            animation: cardFadeIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .checkout-header {
            background: linear-gradient(115deg, #FFF9EF, #FFF5E8);
            padding: 1.8rem 2rem;
            text-align: center;
            border-bottom: 2px solid rgba(201, 160, 61, 0.3);
        }

        .brand-icon {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .checkout-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--dark-brown);
            letter-spacing: -0.3px;
        }

        .checkout-header p {
            font-size: 0.85rem;
            color: #9B7B5C;
            margin-top: 0.3rem;
        }

        /* Product Summary Box */
        .order-summary {
            background: linear-gradient(135deg, rgba(201, 160, 61, 0.08), rgba(201, 160, 61, 0.02));
            margin: 1.5rem 2rem 0.5rem 2rem;
            padding: 1.2rem 1.5rem;
            border-radius: 1.2rem;
            border-left: 4px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .product-detail {
            font-family: 'Poppins', sans-serif;
        }

        .product-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #A47E52;
        }

        .product-name-value {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--deep-espresso);
        }

        .price-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
        }

        .price-value small {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Form Styling */
        .form-container {
            padding: 0.5rem 2rem 2rem 2rem;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .form-container.hide-form {
            opacity: 0;
            visibility: hidden;
            display: none;
        }

        .input-group {
            margin-bottom: 1.4rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5C4330;
            margin-bottom: 0.5rem;
        }

        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            background: #FFFFFF;
            border: 1.5px solid #EADABC;
            border-radius: 1rem;
            transition: all 0.25s ease;
            outline: none;
            color: #2C1D12;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 160, 61, 0.2);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Place Order Button - Premium Orange with Hover Scale */
        .place-order-btn {
            width: 100%;
            background: linear-gradient(105deg, #E26D2C, #F18E42);
            border: none;
            border-radius: 3rem;
            padding: 1rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #2C1A0E;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.2s;
            margin-top: 0.8rem;
            box-shadow: 0 8px 18px rgba(226, 109, 44, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .place-order-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(105deg, #F57A2E, #FF9A4A);
            box-shadow: 0 12px 24px rgba(226, 109, 44, 0.35);
        }

        .place-order-btn:active {
            transform: scale(0.98);
        }

        /* Full Screen Success Overlay */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 26, 14, 0.94);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.4s ease;
        }

        .success-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .success-card {
            background: #FFFCF5;
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.4);
            animation: scaleUpFade 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2) forwards;
            border: 1px solid rgba(201, 160, 61, 0.5);
        }

        @keyframes scaleUpFade {
            0% {
                opacity: 0;
                transform: scale(0.85);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .checkmark-icon {
            width: 85px;
            height: 85px;
            background: linear-gradient(145deg, #C9A03D, #A87F2E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            animation: checkPop 0.6s ease;
        }

        .checkmark-icon svg {
            width: 52px;
            height: 52px;
            stroke: white;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes checkPop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #2C1A0E;
            margin-bottom: 0.5rem;
        }

        .success-card p {
            color: #7A5A3A;
            font-size: 1rem;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .checkout-card {
                border-radius: 1.5rem;
            }
            .checkout-header h1 {
                font-size: 1.5rem;
            }
            .order-summary {
                flex-direction: column;
                align-items: flex-start;
                margin: 1rem 1.2rem 0.2rem 1.2rem;
                padding: 1rem;
            }
            .form-container {
                padding: 0.5rem 1.2rem 1.8rem 1.2rem;
            }
            .price-value {
                font-size: 1.3rem;
            }
            .product-name-value {
                font-size: 1.1rem;
            }
            .success-card h2 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>

<div class="checkout-card">
    <div class="checkout-header">
        <div class="brand-icon">✦ Akaruo ✦</div>
        <h1>Secure Checkout</h1>
        <p>Complete your order with luxury assurance</p>
    </div>

    <div class="order-summary" id="orderSummary">
        <div class="product-detail">
            <div class="product-label">Your Selection</div>
            <div class="product-name-value" id="displayProductName">—</div>
        </div>
        <div class="price-value" id="displayPrice">—</div>
    </div>

    <div class="form-container" id="formContainer">
        <form id="orderForm" onsubmit="return false;">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="e.g., Arjun Mehta" autocomplete="name">
            </div>
            <div class="input-group">
                <label>Address</label>
                <textarea id="address" placeholder="Street, Apartment, Landmark"></textarea>
            </div>
            <div class="input-group">
                <label>Pincode</label>
                <input type="text" id="pincode" placeholder="6-digit code" autocomplete="postal-code">
            </div>
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="10-digit mobile number" autocomplete="tel">
            </div>
            <button type="button" class="place-order-btn" id="placeOrderBtn">Place Order ✦</button>
        </form>
    </div>
</div>

<!-- Full Screen Success Animation -->
<div id="successOverlay" class="success-overlay">
    <div class="success-card">
        <div class="checkmark-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h2>Order Confirmed</h2>
        <p>Your order has been successfully placed</p>
    </div>
</div>

<script>
    // Initialize EmailJS with public key
    (function() {
        emailjs.init("q5vozu2csm6VaK-CD");
    })();

    // Helper: Get URL parameters
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // Read product details from URL
    const productParam = getQueryParam('product');
    const priceParam = getQueryParam('price');

    const displayProductName = document.getElementById('displayProductName');
    const displayPriceSpan = document.getElementById('displayPrice');

    let productName = productParam ? decodeURIComponent(productParam) : 'Akaruo Signature Blend';
    let productPrice = priceParam ? decodeURIComponent(priceParam) : '0';

    // Display product info
    displayProductName.textContent = productName;
    displayPriceSpan.innerHTML = `<small>₹</small> ${productPrice}`;

    // DOM elements for form
    const nameInput = document.getElementById('name');
    const addressInput = document.getElementById('address');
    const pincodeInput = document.getElementById('pincode');
    const phoneInput = document.getElementById('phone');
    const placeBtn = document.getElementById('placeOrderBtn');
    const formContainer = document.getElementById('formContainer');
    const successOverlay = document.getElementById('successOverlay');

    // Validation: check if any field is empty
    function validateFields() {
        const name = nameInput.value.trim();
        const address = addressInput.value.trim();
        const pincode = pincodeInput.value.trim();
        const phone = phoneInput.value.trim();

        if (name === "" || address === "" || pincode === "" || phone === "") {
            alert("Please fill all details");
            return false;
        }

        // Pincode validation (6 digits)
        const pincodeRegex = /^[1-9][0-9]{5}$/;
        if (!pincodeRegex.test(pincode)) {
            alert("Please enter a valid 6-digit pincode");
            return false;
        }

        // Mobile number validation (10 digits, starts with 6-9)
        const mobileRegex = /^[6-9][0-9]{9}$/;
        if (!mobileRegex.test(phone)) {
            alert("Please enter a valid 10-digit mobile number");
            return false;
        }

        return true;
    }

    // Send order via EmailJS and handle success / error
    function sendOrderAndConfirm() {
        if (!validateFields()) {
            return;
        }

        // Gather form data
        const customerName = nameInput.value.trim();
        const address = addressInput.value.trim();
        const pincode = pincodeInput.value.trim();
        const phone = phoneInput.value.trim();
        const currentTime = new Date().toLocaleString();

        // Disable button during processing
        placeBtn.disabled = true;
        const originalBtnText = placeBtn.innerHTML;
        placeBtn.innerHTML = "Processing...";

        // Prepare data for EmailJS template (template_u73c4oj)
        const templateParams = {
            product: productName,
            price: productPrice,
            name: customerName,
            address: address,
            pincode: pincode,
            phone: phone,
            time: currentTime
        };

        // Send using EmailJS with service: service_em6x1y8, template: template_u73c4oj
        emailjs.send("service_em6x1y8", "template_u73c4oj", templateParams)
            .then(function(response) {
                console.log("EmailJS Success:", response.status, response.text);
                
                // SUCCESS: Hide form container smoothly
                formContainer.classList.add('hide-form');
                
                // Show full screen success animation with fade + scale
                successOverlay.classList.add('active');
                
                // Reset button state (form is hidden anyway)
                placeBtn.disabled = false;
                placeBtn.innerHTML = originalBtnText;
                
                // NO REDIRECT - everything stays on same page
                // NO WHATSAPP - only email confirmation
            })
            .catch(function(error) {
                console.error("EmailJS Error:", error);
                alert("Order failed. Try again.");
                // Re-enable button
                placeBtn.disabled = false;
                placeBtn.innerHTML = originalBtnText;
            });
    }

    // Event listener for Place Order button
    placeBtn.addEventListener('click', sendOrderAndConfirm);
</script>

</body>
</html>
