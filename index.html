<!-- index.html --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f5ef;color:#1a1a1a;scroll-behavior:smooth}
header{height:100vh;background:url('https://i.ibb.co/SwH74j66/1000066585.jpg') center/cover no-repeat;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#fff}
h1{font-size:2.5rem}
p{margin:10px 0 20px}
.btn{padding:12px 24px;margin:5px;border:none;border-radius:30px;cursor:pointer;font-weight:600}
.btn-primary{background:#1e6b4c;color:#fff}
.btn-secondary{background:#d4af37;color:#fff}
section{padding:50px 20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:#fff;border-radius:15px;padding:15px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.card img{width:100%;border-radius:10px}
.card button{margin-top:10px}
.about{background:#fff;text-align:center}
.about h2{color:#1e6b4c}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:20px}
.feature{background:#f8f5ef;padding:15px;border-radius:10px}
footer{text-align:center;padding:20px;background:#1e6b4c;color:#fff}
</style>
</head>
<body><header>
<h1>Akaruo Instant Drink Mix</h1>
<p>Premium in Every Sip</p>
<button class="btn btn-primary" onclick="document.getElementById('products').scrollIntoView()">Shop Now</button>
<button class="btn btn-secondary" onclick="window.location.href='catalogue.html'">View Catalogue</button>
</header><section id="products">
<h2 style="text-align:center">Our Products</h2>
<div class="products"><div class="card">
<img src="https://i.ibb.co/5hzKrLP2/1000066814.jpg">
<h3>Coffee Mix</h3>
<p>₹199</p>
<button class="btn btn-primary" onclick="buy('Coffee Mix',199)">Buy Now</button>
</div><div class="card">
<img src="https://i.ibb.co/7tsqr8sP/1000066817.jpg">
<h3>Tea Mix</h3>
<p>₹149</p>
<button class="btn btn-primary" onclick="buy('Tea Mix',149)">Buy Now</button>
</div><div class="card">
<img src="https://i.ibb.co/svmXkFsG/1000066807.jpg">
<h3>Chocolate Mix</h3>
<p>₹179</p>
<button class="btn btn-primary" onclick="buy('Chocolate Mix',179)">Buy Now</button>
</div></div>
</section><section class="about">
<h2>Why Choose Akaruo?</h2>
<div class="features">
<div class="feature">100% Green Certified</div>
<div class="feature">All-Natural Composition</div>
<div class="feature">Healthy Daily Use</div>
<div class="feature">Protein-Enhanced Formula</div>
</div>
</section><footer>
<p>© 2026 Akaruo</p>
</footer><script>
function buy(product,price){
let url=`https://wa.me/919608891170?text=I want to buy ${product} for ₹${price}`;
window.open(url,'_blank');
}
</script></body>
