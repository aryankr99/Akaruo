<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}

/* HERO FIX (NO BLUR) */
.hero{
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url('https://i.ibb.co/TB95TLSB/1000066583.jpg') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
}

.hero h1{font-size:35px;}
.hero p{font-size:18px;}

.btn{
  background:orange;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  color:white;
  margin:5px;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img{width:100%}

/* CART */
.cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:#fff;
  padding:15px;
  border-radius:50%;
}

/* POPUP FORM */
.popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.form-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:300px;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Akaruo Instant Drink Mix</h1>
  <p>Premium in Every Sip</p>

  <button class="btn" onclick="scrollToProducts()">Shop Now</button>
  <a href="catalogue.html"><button class="btn">View Catalogue</button></a>
</div>

<!-- PRODUCTS -->
<h2 style="text-align:center">Our Products</h2>

<div class="products" id="products">

<div class="card">
<img src="https://i.ibb.co/0jdSrmjs/1000066585.jpg">
<h3>Instant Coffee</h3>
<p>₹99</p>
<button class="btn" onclick="addToCart('Instant Coffee',99)">Add to Cart</button>
</div>

<div class="card">
<img src="https://i.ibb.co/WvfKhLZ9/1000066807.jpg">
<h3>Iced Coffee</h3>
<p>₹129</p>
<button class="btn" onclick="addToCart('Iced Coffee',129)">Add to Cart</button>
</div>

</div>

<!-- CART BUTTON -->
<button class="cart-btn" onclick="openForm()">🛒</button>

<!-- ORDER FORM -->
<div class="popup" id="popup">
  <div class="form-box">
    <h3>Order Details</h3>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="phone" placeholder="Mobile Number">
    <input type="text" id="address" placeholder="Address">
    <input type="text" id="city" placeholder="City">
    <input type="text" id="pincode" placeholder="Pincode">

    <select id="payment">
      <option>UPI</option>
      <option>Cash on Delivery</option>
    </select>

    <button class="btn" onclick="placeOrder()">Place Order</button>
    <button onclick="closeForm()">Close</button>
  </div>
</div>

<script>

let cart=[];

function scrollToProducts(){
 document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

function addToCart(name,price){
 cart.push({name,price});
 alert(name+" added to cart");
}

function openForm(){
 if(cart.length==0){
   alert("Cart is empty");
   return;
 }
 document.getElementById("popup").style.display="flex";
}

function closeForm(){
 document.getElementById("popup").style.display="none";
}

function placeOrder(){

 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;
 let address=document.getElementById("address").value;
 let city=document.getElementById("city").value;
 let pincode=document.getElementById("pincode").value;
 let payment=document.getElementById("payment").value;

 let message="Order Details:%0A";

 cart.forEach(item=>{
   message+=item.name+" ₹"+item.price+"%0A";
 });

 message+=`Name: ${name}%0APhone: ${phone}%0AAddress: ${address}, ${city}, ${pincode}%0APayment: ${payment}`;

 let url=`https://wa.me/919608891170?text=${message}`;
 window.open(url,"_blank");
}

</script>

</body>
</html>
