<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Instant Drink Mix</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* NAV */
nav{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:20px;
position:fixed;
width:100%;
top:0;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1524594154908-eddc3e2c6e28") center/cover;
color:white;
}

.hero h1{
font-size:50px;
}

.hero p{
font-size:20px;
margin:10px;
}

.hero button{
padding:12px 25px;
background:orange;
border:none;
color:white;
font-size:18px;
cursor:pointer;
border-radius:25px;
}

/* PRODUCTS */
.products{
padding:80px 20px;
text-align:center;
}

.carousel{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
scroll-behavior:smooth;
}

.carousel img{
width:200px;
border-radius:10px;
}

/* CONTACT */
.contact{
background:black;
color:white;
text-align:center;
padding:40px;
}
</style>

</head>

<body>

<nav>
Akaruo Instant Drink Mix
</nav>

<section class="hero">
<h1>Premium in Every Sip</h1>
<p>Refreshing instant drink mix for every moment</p>
<button onclick="scrollToProducts()">Shop Now</button>
</section>

<section class="products" id="products">
<h2>Our Products</h2>

<div class="carousel" id="carousel">

<img src="https://i.ibb.co/HfKr7nxc/1000066999.jpg">
<img src="https://i.ibb.co/hxcfYsM0/1000066878.jpg">
<img src="https://i.ibb.co/FkHRnwdg/1000067337.jpg">
<img src="https://i.ibb.co/qLHT3xKh/1000066877.jpg">
<img src="https://i.ibb.co/VccJLtLz/1000066880.jpg">

</div>
</section>

<section class="contact">
<h2>Contact Owner</h2>
<p>Email: aryankumar2007chy@gmail.com</p>
</section>

<script>

/* Scroll button */
function scrollToProducts(){
document.getElementById("products").scrollIntoView({
behavior:"smooth"
});
}

/* Auto slider */
let carousel = document.getElementById("carousel");

setInterval(()=>{
carousel.scrollLeft += 220;

if(carousel.scrollLeft >= carousel.scrollWidth - carousel.clientWidth){
carousel.scrollLeft = 0;
}
},2000);

</script>

</body>
</html>
