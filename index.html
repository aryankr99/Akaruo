<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Instant Drink Mix</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:black;
position:fixed;
width:100%;
}

.cart{
background:#ff7a00;
padding:8px 15px;
border-radius:20px;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1524594154908-eddc3e2c6e28") center/cover;
}

.hero h1{
font-size:50px;
}

.hero button{
padding:12px 25px;
background:#ff7a00;
border:none;
border-radius:25px;
color:white;
font-size:18px;
cursor:pointer;
}

/* PRODUCTS */

.products{
padding:80px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#ff7a00;
font-size:18px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
background:#ff7a00;
color:white;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<h2>Akaruo</h2>
<div class="cart">Cart: <span id="count">0</span></div>
</nav>

<section class="hero">
<h1>Premium in Every Sip</h1>
<button onclick="scrollToProducts()">Shop Now</button>
</section>

<section class="products" id="products">
<h2>Our Products</h2>

<div class="grid">

<div class="card">
<img src="https://i.ibb.co/HfKr7nxc/1000066999.jpg">
<p class="price">₹99</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://i.ibb.co/hxcfYsM0/1000066878.jpg">
<p class="price">₹99</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://i.ibb.co/FkHRnwdg/1000067337.jpg">
<p class="price">₹99</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://i.ibb.co/qLHT3xKh/1000066877.jpg">
<p class="price">₹99</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://i.ibb.co/VccJLtLz/1000066880.jpg">
<p class="price">₹99</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</div>
</section>

<script>

let count = 0;

function addCart(){
count++;
document.getElementById("count").innerText = count;
alert("Product Added to Cart 🛒");
}

function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
