<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
height:100vh;
overflow:hidden;
}

/* Background */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://i.ibb.co/pvtWqhg4/9a6b0b3fee7d1bb5a3d835db58c37514.jpg') center/cover no-repeat;
animation:zoom 20s infinite alternate ease-in-out;
}

.bg::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

@keyframes zoom{
from{transform:scale(1);} 
to{transform:scale(1.1);} 
}

/* Center Box */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
width:90%;
max-width:380px;
}

.login-box{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:16px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.2);
color:#fff;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);} 
to{opacity:1;transform:translateY(0);} 
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

.login-btn{
background:#ff7a18;
color:#fff;
}

.google-btn{
background:#fff;
color:#333;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.google-btn img{
width:18px;
}

.error{
color:#ff6b6b;
font-size:14px;
margin-top:10px;
text-align:center;
}

@media(max-width:480px){
.login-box{padding:20px;}
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">
<div class="login-box">
<h2>Akaruo</h2>

<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<button class="login-btn" onclick="login()">Login</button>

<button class="google-btn" onclick="googleLogin()">
<img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
Continue with Google
</button>

<div class="error" id="error"></div>

</div>
</div>

<script>
// TODO: Replace with your Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('error');

  if(!email || !password){
    errorDiv.innerText = "Please fill all fields";
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .then(()=>{
      window.location.href = "home.html";
    })
    .catch(err=>{
      errorDiv.innerText = err.message;
    });
}

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  const errorDiv = document.getElementById('error');

  auth.signInWithPopup(provider)
    .then(()=>{
      window.location.href = "home.html";
    })
    .catch(err=>{
      errorDiv.innerText = err.message;
    });
}
</script>

</body>
</html>
