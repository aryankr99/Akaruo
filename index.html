<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Login</title>

<style>
body{
 margin:0;
 font-family:Arial;
 overflow:hidden;
}

/* BACKGROUND IMAGE ANIMATION */
.bg{
 position:fixed;
 width:100%;
 height:100%;
 background:url('https://i.ibb.co/pvtWqhg4/9a6b0b3fee7d1bb5a3d835db58c37514.jpg') center/cover no-repeat;
 animation:zoom 12s infinite alternate;
 z-index:-1;
}

@keyframes zoom{
 from{transform:scale(1);}
 to{transform:scale(1.1);}
}

/* DARK OVERLAY */
.overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
 display:flex;
 justify-content:center;
 align-items:center;
}

/* LOGIN BOX */
.box{
 background:rgba(255,255,255,0.1);
 backdrop-filter:blur(10px);
 padding:25px;
 border-radius:12px;
 width:300px;
 text-align:center;
 color:white;
}

.box h2{
 margin-bottom:15px;
}

/* INPUT */
input{
 width:100%;
 padding:10px;
 margin:8px 0;
 border:none;
 border-radius:6px;
}

/* BUTTON */
.btn{
 width:100%;
 padding:10px;
 margin-top:10px;
 border:none;
 border-radius:20px;
 cursor:pointer;
}

/* NORMAL LOGIN */
.login-btn{
 background:orange;
 color:white;
}

/* GOOGLE BUTTON */
.google-btn{
 background:white;
 color:black;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:10px;
 font-weight:bold;
}

.google-btn img{
 width:20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay">
  <div class="box">
    <h2>Akaruo Login</h2>

    <input type="email" placeholder="Enter Email" id="email">
    <input type="password" placeholder="Password" id="pass">

    <button class="btn login-btn" onclick="login()">Login</button>

    <p>OR</p>

    <button class="btn google-btn" onclick="googleLogin()">
      <img src="https://img.icons8.com/color/48/google-logo.png">
      Continue with Google
    </button>
  </div>
</div>

<script>
function login(){
 let email=document.getElementById("email").value;
 let pass=document.getElementById("pass").value;

 if(email && pass){
   window.location.href="home.html";
 }else{
   alert("Please fill details");
 }
}

/* FAKE GOOGLE LOGIN (UI only) */
function googleLogin(){
 alert("Google Login Coming Soon...");
 // redirect for now
 window.location.href="home.html";
}
</script>

</body>
</html>
