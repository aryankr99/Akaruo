<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Instant Drink Mix</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1524594154908-eddc3e2c6e28') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{font-size:50px;}
.hero p{font-size:22px;}

.btn{
padding:12px 25px;
background:#ff6600;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-size:18px;
}

/* PRODUCTS */
.products{
padding:50px;
text-align:center;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
scroll-behavior:smooth;
}

.carousel::-webkit-scrollbar{display:none;}

.product{
min-width:250px;
background:white;
padding:10px;
border-radius:10px;
}

.product img{width:100%;border-radius:10px;}

</style>
</head>

<body>

<section class="hero">
<h1>Premium in Every Sip</h1>
<p>Akaruo Instant Drink Mix</p>
<button class="btn" onclick="scrollToProducts()">Shop Now</button>
</section>

<section class="products" id="products">
<h2>Our Products</h2>

<div class="carousel" id="carousel">

<div class="product"><img src="https://i.ibb.co/HfKr7nxc/1000066999.jpg"></div>
<div class="product"><img src="https://i.ibb.co/hxcfYsM0/1000066878.jpg"></div>
<div class="product"><img src="https://i.ibb.co/FkHRnwdg/1000067337.jpg"></div>
<div class="product"><img src="https://i.ibb.co/qLHT3xKh/1000066877.jpg"></div>
<div class="product"><img src="https://i.ibb.co/VccJLtLz/1000066880.jpg"></div>

</div>
</section>

<script>

/* 🔥 SCROLL FUNCTION */
function scrollToProducts(){
document.getElementById("products").scrollIntoView({
behavior:"smooth"
});
}

/* 🔥 AUTO SLIDER */
const carousel = document.getElementById("carousel");

let position = 0;

function autoSlide(){
position += 260;

if(position >= carousel.scrollWidth){
position = 0;
}

carousel.scrollTo({
left: position,
behavior: "smooth"
});
}

/* हर 3 सेकंड में slide */
setInterval(autoSlide, 3000);


/* 🔥 TOUCH SCROLL IMPROVEMENT */
let isDown = false;
let startX;
let scrollLeft;

carousel.addEventListener('mousedown', (e)=>{
isDown = true;
startX = e.pageX - carousel.offsetLeft;
scrollLeft = carousel.scrollLeft;
});

carousel.addEventListener('mouseleave', ()=> isDown = false);
carousel.addEventListener('mouseup', ()=> isDown = false);

carousel.addEventListener('mousemove', (e)=>{
if(!isDown) return;
e.preventDefault();
const x = e.pageX - carousel.offsetLeft;
const walk = (x - startX) * 2;
carousel.scrollLeft = scrollLeft - walk;
});

</script>

</body>
</html>
