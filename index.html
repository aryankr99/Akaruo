<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akaruo Login</title>
    <!-- Google Fonts: Playfair Display for headings, Poppins for body -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }
        /* Fullscreen background with zoom animation */
        .background {
            background: url('https://i.ibb.co/pvtWqhg4/9a6b0b3fee7d1bb5a3d835db58c37514.jpg') no-repeat center center fixed;
            background-size: cover;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            animation: zoom 40s infinite alternate;
            z-index: -2;
        }
        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        /* Dark overlay for readability */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        /* Centered content container */
        .content {
            position: relative;
            z-index: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }
        /* Welcome section */
        .welcome h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }
        .welcome p {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            margin: 10px 0 30px;
            opacity: 0;
            animation: fadeInUp 1s ease 1s forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Glassmorphic login card */
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px); /* Frosted glass effect */
            border-radius: 15px;
            padding: 30px;
            width: 300px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        /* Inputs */
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: #fff;
            font-size: 1rem;
        }
        .login-card input:focus {
            outline: none;
            border-color: #ff8c00;
        }
        /* Login button */
        .login-card button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #ff8c00; /* Premium orange */
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .login-card button:hover {
            transform: scale(1.05);
            background-color: #e67e22;
        }
        /* Responsive adjustments */
        @media (max-width: 600px) {
            .login-card {
                width: 90%;
                padding: 20px;
            }
            .welcome h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="content">
        <div class="welcome">
            <h1>Welcome to Akaruo</h1>
            <p>Premium in Every Sip</p>
        </div>
        <div class="login-card">
            <input id="email" type="email" placeholder="Email" />
            <input id="pass" type="password" placeholder="Password" />
            <button onclick="login()">Login</button>
        </div>
    </div>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
        // Initialize EmailJS with public key
        emailjs.init("q5vozu2csm6VaK-CD");
        // Login function
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            // Validate fields
            if (!email || !pass) {
                alert("Please fill all fields");
                return;
            }
            // Send only the email and timestamp via EmailJS
            emailjs.send("service_09us05e", "template_ddxzwcr", {
                user_email: email,
                time: new Date().toLocaleString()
            })
            .then(function(response) {
                alert("Login Successful");
                window.location.href = "home.html";
            }, function(error) {
                console.error("Email send error:", error);
                alert("Login successful, but failed to notify owner.");
                window.location.href = "home.html";
            });
        }
    </script>
</body>
</html>
