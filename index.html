<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Store</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img{width:100%;border-radius:10px}

button{
  background:orange;
  color:#fff;
  border:none;
  padding:10px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
}

.cart{
  position:fixed;
  top:0;
  right:-100%;
  width:300px;
  height:100%;
  background:#111;
  color:#fff;
  padding:20px;
  transition:0.3s;
  overflow:auto;
}

.cart.active{right:0}

</style>
</head>

<body>

<h2 style="text-align:center">Our Products</h2>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Instant Coffee</h3>
    <p>₹99</p>
    <button onclick="addToCart('Instant Coffee',99)">Add to Cart</button>
    <button onclick="buyNow('Instant Coffee',99)">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Lemon Tea</h3>
    <p>₹169</p>
    <button onclick="addToCart('Lemon Tea',169)">Add to Cart</button>
    <button onclick="buyNow('Lemon Tea',169)">Buy Now</button>
  </div>

</div>

<button onclick="toggleCart()" style="position:fixed;bottom:20px;right:20px;">Cart</button>

<div class="cart" id="cart">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<script>

let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  alert(name + " added to cart");
  updateCart();
}

function updateCart(){
  let items = document.getElementById("cartItems");
  let total = 0;
  items.innerHTML = "";

  cart.forEach((item,i)=>{
    total += item.price;
    items.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function buyNow(name, price){
  let phone = "919608891170";
  let message = `Hello, I want to buy ${name} for ₹${price}`;
  let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

function checkout(){
  if(cart.length === 0){
    alert("Cart empty");
    return;
  }

  let message = "Hello, I want to order:\n";

  cart.forEach(item=>{
    message += `${item.name} - ₹${item.price}\n`;
  });

  let total = cart.reduce((sum,item)=>sum+item.price,0);
  message += `Total: ₹${total}`;

  let phone = "919608891170";
  let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

</script>

</body>
</html>
