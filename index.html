<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

/* HERO SECTION */
.hero{
  height:100vh;
  background:url('https://i.imgur.com/8Km9tLL.jpg') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}

.hero h1{
  font-size:40px;
}

.hero p{
  font-size:20px;
  margin:10px 0;
}

.hero button{
  padding:12px 25px;
  background:orange;
  border:none;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  background:orange;
  color:white;
  border:none;
  padding:10px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Akaruo Instant Drink Mix</h1>
  <p>Premium in Every Sip</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</div>

<h2 style="text-align:center">Our Products</h2>

<div class="products" id="products">

  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="https://i.imgur.com/2DhmtJ4.png">
    <h3>Instant Coffee Mix</h3>
    <p>₹99</p>
    <button onclick="buyNow('Instant Coffee Mix',99)">Buy Now</button>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">
    <img src="https://i.imgur.com/W6bXGJc.png">
    <h3>Iced Coffee Mix</h3>
    <p>₹129</p>
    <button onclick="buyNow('Iced Coffee Mix',129)">Buy Now</button>
  </div>

  <!-- PRODUCT 3 -->
  <div class="card">
    <img src="https://i.imgur.com/cGZQx8R.png">
    <h3>Classic Black Coffee</h3>
    <p>₹119</p>
    <button onclick="buyNow('Classic Black Coffee',119)">Buy Now</button>
  </div>

  <!-- PRODUCT 4 -->
  <div class="card">
    <img src="https://i.imgur.com/zY6gG9R.png">
    <h3>Zest Lemon Tea</h3>
    <p>₹169</p>
    <button onclick="buyNow('Zest Lemon Tea',169)">Buy Now</button>
  </div>

  <!-- PRODUCT 5 -->
  <div class="card">
    <img src="https://i.imgur.com/8U5pG6g.png">
    <h3>Royal Masala Milk</h3>
    <p>₹169</p>
    <button onclick="buyNow('Royal Masala Milk',169)">Buy Now</button>
  </div>

  <!-- PRODUCT 6 -->
  <div class="card">
    <img src="https://i.imgur.com/1Q9Z1Zm.png">
    <h3>Velvet Hot Chocolate</h3>
    <p>₹179</p>
    <button onclick="buyNow('Velvet Hot Chocolate',179)">Buy Now</button>
  </div>

</div>

<!-- HOW TO MAKE -->
<div style="text-align:center;padding:30px;">
  <h2>How to Make</h2>
  <img src="https://i.imgur.com/3ZQ3Z9L.png" width="300">
</div>

<!-- SCRIPT -->
<script>

function scrollToProducts(){
  document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

function buyNow(name, price){
  let phone = "919608891170";
  let message = `Hello, I want to buy ${name} for ₹${price}`;
  let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

</script>

</body>
</html>
