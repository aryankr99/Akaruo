<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Akaruo • Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            width: 100vw; height: 100vh;
            overflow: hidden; background: #000;
        }
        .slider {
            position: relative; width: 100%; height: 100%;
        }
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }
        .slide.active { opacity: 1; z-index: 2; }
        .slide1 { background-image: url('https://i.ibb.co/d0FPHxZP/1000066585.jpg'); }
        .slide2 { background-image: url('https://i.ibb.co/mVnnjygM/1000066584.jpg'); }
        .slide3 { background-image: url('https://i.ibb.co/g2xj0Wy/1000066588.jpg'); }
        .overlay-home {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.35);
            z-index: 3;
        }
        .hero {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; text-align: center; width: 90%;
            animation: fadeSlide 1s;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translate(-50%, -40%); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }
        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem; font-weight: 600;
            color: #f5e7d9; text-shadow: 0 10px 40px #000;
            letter-spacing: 8px; margin-bottom: 3rem;
        }
        .btn-group {
            display: flex; flex-wrap: wrap; gap: 1.5rem;
            justify-content: center;
        }
        .glass-btn {
            background: rgba(20,15,10,0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(200,170,130,0.5);
            padding: 1.2rem 2.8rem; border-radius: 60px;
            font-size: 1.2rem; font-weight: 500; color: #efe0cf;
            cursor: pointer; transition: all 0.35s;
            box-shadow: 0 15px 30px #00000040;
            letter-spacing: 3px; min-width: 260px;
        }
        .glass-btn:hover {
            background: rgba(180,140,90,0.5);
            transform: scale(1.05);
            box-shadow: 0 0 30px #d4af7a80;
            border-color: #e6c394;
        }
        @media (max-width: 640px) {
            .hero-title { font-size: 2.8rem; letter-spacing: 4px; }
            .glass-btn { padding: 1rem 1.5rem; font-size: 1rem; min-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="slider">
        <div class="slide slide1 active"></div>
        <div class="slide slide2"></div>
        <div class="slide slide3"></div>
        <div class="overlay-home"></div>
    </div>
    <div class="hero">
        <div class="hero-title">WELCOME TO AKARUO</div>
        <div class="btn-group">
            <button class="glass-btn" id="signatureBtn">SIGNATURE COLLECTION</button>
            <button class="glass-btn" id="itemsBtn">OUR ITEMS</button>
        </div>
    </div>
    <script>
        (function(){
            const slides = document.querySelectorAll('.slide');
            let idx = 0;
            setInterval(() => {
                slides[idx].classList.remove('active');
                idx = (idx + 1) % slides.length;
                slides[idx].classList.add('active');
            }, 4200);
            document.getElementById('signatureBtn').addEventListener('click', ()=>{
                document.body.style.opacity='0'; document.body.style.transition='opacity 0.5s';
                setTimeout(()=>{ window.location.href='signature.html'; },400);
            });
            document.getElementById('itemsBtn').addEventListener('click', ()=>{
                document.body.style.opacity='0';
                setTimeout(()=>{ window.location.href='items.html'; },400);
            });
        })();
    </script>
</body>
</html>
