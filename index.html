<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akaruo Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

/* BACKGROUND */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://i.ibb.co/pvtWqhg4/9a6b0b3fee7d1bb5a3d835db58c37514.jpg') no-repeat center/cover;
  animation:zoomBg 10s infinite alternate;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

/* ZOOM ANIMATION */
@keyframes zoomBg{
  from{background-size:100%;}
  to{background-size:110%;}
}

/* LOGIN BOX */
.login-box{
  position:relative;
  z-index:1;
  width:90%;
  max-width:350px;
  padding:25px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.1);
  text-align:center;
  color:#fff;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* TITLE */
.login-box h1{
  margin-bottom:20px;
}

/* INPUTS */
.login-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
  font-size:16px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}

/* LOGIN BUTTON */
.login-btn{
  background:orange;
  color:white;
}

/* GOOGLE BUTTON */
.google-btn{
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* ERROR */
#error{
  color:#ff4d4d;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">
  <h1>Akaruo</h1>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="pass" placeholder="Enter Password">

  <button class="btn login-btn" onclick="login()">Login</button>

  <button class="btn google-btn" onclick="googleLogin()">
    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
    Continue with Google
  </button>

  <p id="error"></p>
</div>

<script>

/* LOGIN FUNCTION */
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(email === "" || pass === ""){
    document.getElementById("error").innerText = "Please fill all fields";
  } else {
    alert("Login Successful");
    window.location.href = "home.html"; // redirect
  }
}

/* GOOGLE LOGIN */
function googleLogin(){
  alert("Google Login Successful");
  window.location.href = "home.html"; // redirect
}

</script>

</body>
</html><!DOCTYPE html>

.hero{

</html>
