<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Akaruo | Secure Checkout</title>
    <!-- Google Fonts: Playfair Display + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #FCF7EF 0%, #F3EAE0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* Premium Color Palette */
        :root {
            --gold: #C9A03D;
            --gold-dark: #B68B2E;
            --dark-brown: #3E2A1F;
            --deep-espresso: #2C1A0E;
            --beige-light: #FFF9F0;
            --shadow-premium: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        /* Main Card - Glassmorphism / Premium Card */
        .checkout-card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 252, 245, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(201, 160, 61, 0.3);
            overflow: hidden;
            transition: transform 0.3s ease;
            animation: cardFadeIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .checkout-header {
            background: linear-gradient(115deg, #FFF9EF, #FFF5E8);
            padding: 1.8rem 2rem;
            text-align: center;
            border-bottom: 2px solid rgba(201, 160, 61, 0.3);
        }

        .brand-icon {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .checkout-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--dark-brown);
            letter-spacing: -0.3px;
        }

        .checkout-header p {
            font-size: 0.85rem;
            color: #9B7B5C;
            margin-top: 0.3rem;
        }

        /* Product Summary Box */
        .order-summary {
            background: linear-gradient(135deg, rgba(201, 160, 61, 0.08), rgba(201, 160, 61, 0.02));
            margin: 1.5rem 2rem 0.5rem 2rem;
            padding: 1.2rem 1.5rem;
            border-radius: 1.2rem;
            border-left: 4px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .product-detail {
            font-family: 'Poppins', sans-serif;
        }

        .product-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #A47E52;
        }

        .product-name-value {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--deep-espresso);
        }

        .price-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
        }

        .price-value small {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Form Styling */
        .form-container {
            padding: 0.5rem 2rem 2rem 2rem;
        }

        .input-group {
            margin-bottom: 1.4rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5C4330;
            margin-bottom: 0.5rem;
        }

        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            background: #FFFFFF;
            border: 1.5px solid #EADABC;
            border-radius: 1rem;
            transition: all 0.25s ease;
            outline: none;
            color: #2C1D12;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 160, 61, 0.2);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Place Order Button */
        .place-order-btn {
            width: 100%;
            background: linear-gradient(105deg, #C9A03D, #B58C2E);
            border: none;
            border-radius: 3rem;
            padding: 1rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #2C1A0E;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.8rem;
            box-shadow: 0 8px 18px rgba(185, 140, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .place-order-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #D4AE4A, #C49B38);
            box-shadow: 0 12px 24px rgba(185, 140, 55, 0.3);
        }

        .place-order-btn:active {
            transform: translateY(1px);
        }

        /* Full Screen Success Overlay */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 26, 14, 0.92);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.3s ease;
        }

        .success-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .success-card {
            background: #FFFCF5;
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.3);
            animation: scaleUpFade 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2) forwards;
            border: 1px solid rgba(201, 160, 61, 0.5);
        }

        @keyframes scaleUpFade {
            0% {
                opacity: 0;
                transform: scale(0.85);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .checkmark-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #C9A03D, #A87F2E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            animation: checkPop 0.6s ease;
        }

        .checkmark-icon svg {
            width: 48px;
            height: 48px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        @keyframes checkPop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #2C1A0E;
            margin-bottom: 0.5rem;
        }

        .success-card p {
            color: #7A5A3A;
            font-size: 0.95rem;
        }

        /* Responsive */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .checkout-card {
                border-radius: 1.5rem;
            }
            .checkout-header h1 {
                font-size: 1.5rem;
            }
            .order-summary {
                flex-direction: column;
                align-items: flex-start;
                margin: 1rem 1.2rem 0.2rem 1.2rem;
                padding: 1rem;
            }
            .form-container {
                padding: 0.5rem 1.2rem 1.8rem 1.2rem;
            }
            .price-value {
                font-size: 1.3rem;
            }
            .product-name-value {
                font-size: 1.1rem;
            }
        }

        /* Error styling */
        .error-input {
            border-color: #D9534F !important;
            background-color: #FFF5F5 !important;
        }

        .error-msg {
            color: #C76B64;
            font-size: 0.7rem;
            margin-top: 0.3rem;
            display: block;
        }
    </style>
</head>
<body>

<div class="checkout-card">
    <div class="checkout-header">
        <div class="brand-icon">✦ Akaruo ✦</div>
        <h1>Secure Checkout</h1>
        <p>Complete your order with luxury assurance</p>
    </div>

    <div class="order-summary" id="orderSummary">
        <div class="product-detail">
            <div class="product-label">Your Selection</div>
            <div class="product-name-value" id="displayProductName">—</div>
        </div>
        <div class="price-value" id="displayPrice">—</div>
    </div>

    <div class="form-container">
        <form id="orderForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="e.g., Arjun Mehta" autocomplete="name">
            </div>
            <div class="input-group">
                <label>Address</label>
                <textarea id="address" placeholder="Street, Apartment, Landmark"></textarea>
            </div>
            <div class="input-group">
                <label>Pincode</label>
                <input type="text" id="pincode" placeholder="6-digit code" autocomplete="postal-code">
            </div>
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="10-digit mobile number" autocomplete="tel">
            </div>
            <button type="button" class="place-order-btn" id="placeOrderBtn">Place Order ✦</button>
        </form>
    </div>
</div>

<!-- Success Overlay Animation (full screen) -->
<div id="successOverlay" class="success-overlay">
    <div class="success-card">
        <div class="checkmark-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h2>Order Confirmed ✅</h2>
        <p>Your premium order has been received. You'll receive an email confirmation shortly.</p>
    </div>
</div>

<script>
    // Initialize EmailJS with public key
    (function() {
        emailjs.init("q5vozu2csm6VaK-CD");
    })();

    // Helper: Get URL parameters
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // Display product info from URL
    const productParam = getQueryParam('product');
    const priceParam = getQueryParam('price');

    const displayProductName = document.getElementById('displayProductName');
    const displayPriceSpan = document.getElementById('displayPrice');

    let productName = productParam ? decodeURIComponent(productParam) : 'Akaruo Special Blend';
    let productPrice = priceParam ? decodeURIComponent(priceParam) : '0';

    // Format price display
    displayProductName.textContent = productName;
    displayPriceSpan.innerHTML = `<small>₹</small> ${productPrice}`;

    // DOM elements
    const fullNameInput = document.getElementById('fullName');
    const addressInput = document.getElementById('address');
    const pincodeInput = document.getElementById('pincode');
    const mobileInput = document.getElementById('mobile');
    const placeBtn = document.getElementById('placeOrderBtn');
    const successOverlay = document.getElementById('successOverlay');

    // Helper: remove previous error styles
    function clearErrors() {
        const inputs = [fullNameInput, addressInput, pincodeInput, mobileInput];
        inputs.forEach(input => {
            input.classList.remove('error-input');
            let parent = input.parentElement;
            let existingErr = parent.querySelector('.error-msg');
            if (existingErr) existingErr.remove();
        });
    }

    // Helper: show error on specific field
    function showError(input, message) {
        input.classList.add('error-input');
        let parent = input.parentElement;
        let existingErr = parent.querySelector('.error-msg');
        if (existingErr) existingErr.remove();
        let errSpan = document.createElement('span');
        errSpan.className = 'error-msg';
        errSpan.textContent = message;
        parent.appendChild(errSpan);
    }

    // Validate all fields
    function validateForm() {
        let isValid = true;
        clearErrors();

        const fullName = fullNameInput.value.trim();
        const address = addressInput.value.trim();
        const pincode = pincodeInput.value.trim();
        const mobile = mobileInput.value.trim();

        // Full name validation
        if (fullName === "") {
            showError(fullNameInput, "Full name is required");
            isValid = false;
        } else if (fullName.length < 3) {
            showError(fullNameInput, "Enter a valid name (min 3 characters)");
            isValid = false;
        }

        // Address validation
        if (address === "") {
            showError(addressInput, "Address is required");
            isValid = false;
        } else if (address.length < 5) {
            showError(addressInput, "Please enter a complete address");
            isValid = false;
        }

        // Pincode validation (6 digits)
        const pincodeRegex = /^[1-9][0-9]{5}$/;
        if (pincode === "") {
            showError(pincodeInput, "Pincode is required");
            isValid = false;
        } else if (!pincodeRegex.test(pincode)) {
            showError(pincodeInput, "Enter a valid 6-digit pincode");
            isValid = false;
        }

        // Mobile validation (10 digits, Indian format)
        const mobileRegex = /^[6-9][0-9]{9}$/;
        if (mobile === "") {
            showError(mobileInput, "Mobile number is required");
            isValid = false;
        } else if (!mobileRegex.test(mobile)) {
            showError(mobileInput, "Enter a valid 10-digit mobile number");
            isValid = false;
        }

        return isValid;
    }

    // Send order via EmailJS and show success animation (no redirect)
    function sendOrderAndConfirm() {
        if (!validateForm()) {
            return;
        }

        // Gather form data
        const customerName = fullNameInput.value.trim();
        const address = addressInput.value.trim();
        const pincode = pincodeInput.value.trim();
        const phone = mobileInput.value.trim();
        const currentTime = new Date().toLocaleString();

        // Disable button temporarily to avoid double submission
        placeBtn.disabled = true;
        placeBtn.textContent = "Processing...";

        // Prepare data for EmailJS template: product, price, name, address, pincode, phone, time
        const templateParams = {
            product: productName,
            price: productPrice,
            name: customerName,
            address: address,
            pincode: pincode,
            phone: phone,
            time: currentTime
        };

        // Send via EmailJS (service_09us05e, template_ddxzwcr)
        emailjs.send("service_09us05e", "template_ddxzwcr", templateParams)
            .then(function(response) {
                console.log("EmailJS Success:", response.status, response.text);
                // Show full screen success animation (Order Confirmed ✅)
                successOverlay.classList.add('active');
                
                // Optional: reset button after 2 sec (but animation remains)
                placeBtn.disabled = false;
                placeBtn.textContent = "Place Order ✦";
                
                // Prevent closing overlay when clicking on it? we want it persistent; no auto-close unless user clicks? 
                // Requirement: after order, DO NOT redirect, show full screen success animation.
                // Add ability to close only if user clicks anywhere? but not required. But for UX we can keep permanent until reload? 
                // I'll make the overlay static, but we can allow click outside? But spec doesn't forbid but better keep elegant.
                // However no redirect, just animation shown. User can refresh if needed, but we'll keep.
                // To avoid trapping user, we can add subtle "continue shopping" but not required. 
                // For perfect premium, we let overlay remain but optional click to close? Not required but better.
                // But spec only asks to show animation + checkmark. I'll make sure animation stays and can be closed by clicking anywhere (optional, not violating rule)
                // but to ensure not breaking: I'll attach close on overlay click - because no redirect needed and user may want to see page again.
                // However requirement: "After Order: DO NOT redirect. Show full screen success animation: Order Confirmed ✅. Add fade + scale animation, checkmark icon."
                // It doesn't say prevent closing, so we add elegant close (click on overlay) to return to checkout but order is already placed.
                // That's user-friendly and doesn't break any condition. (No external redirect, everything inside page.)
            })
            .catch(function(error) {
                console.error("EmailJS Error:", error);
                alert("There was an issue processing your order. Please check your connection and try again.");
                placeBtn.disabled = false;
                placeBtn.textContent = "Place Order ✦";
            });
    }

    // Event listener for Place Order button
    placeBtn.addEventListener('click', sendOrderAndConfirm);

    // Optional: close success overlay when clicked (doesn't redirect, just hides overlay)
    // So user can see checkout page after confirmation. Keeps full premium experience.
    successOverlay.addEventListener('click', function() {
        successOverlay.classList.remove('active');
        // Optional: clear form fields if needed? Not required, but order already sent.
        // According to spec no redirect and success animation shown. This just dismisses.
        // No data loss.
    });

    // Additionally, check if product/price missing from URL, fallback to demo
    if (!productParam || !priceParam) {
        console.log("Using fallback product info");
    }
</script>
</body>
</html>
